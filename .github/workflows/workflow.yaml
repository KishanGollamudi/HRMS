name: SprintFlow CI

on:
  push:
    branches:
      - feature/local-setup
  pull_request:
    branches:
      - feature/local-setup
  workflow_dispatch:

permissions:
  contents: read

env:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  DB_NAME: sprintflow_db
  DB_USERNAME: sprintflow
  DB_PASSWORD: sprintflow123
  APP_JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  APP_MAIL_KEY: 0123456789abcdef0123456789abcdef
  APP_CORS_ORIGINS: http://localhost:5173,http://localhost:3000
  APP_FRONTEND_URL: http://localhost
  VITE_API_BASE_URL: http://localhost:8080
  VITE_WS_URL: ws://localhost:8080

jobs:
  backend:
    name: Backend Build And Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: sprintflow_db
          MYSQL_USER: sprintflow
          MYSQL_PASSWORD: sprintflow123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -usprintflow -psprintflow123 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: ${{ env.BACKEND_DIR }}
        run: chmod +x mvnw

      - name: Build backend
        working-directory: ${{ env.BACKEND_DIR }}
        run: ./mvnw -B -ntp clean package -DskipTests

      - name: Test backend
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/sprintflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DDL_AUTO: update
          APP_JWT_SECRET: ${{ env.APP_JWT_SECRET }}
          APP_MAIL_KEY: ${{ env.APP_MAIL_KEY }}
        run: ./mvnw -B -ntp test

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          if-no-files-found: error

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/*.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_WS_URL: ${{ env.VITE_WS_URL }}
          VITE_USE_MOCK: 'false'
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  docker-compose:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose config
        run: docker compose -f docker-compose.yml config

      - name: Build docker compose images
        run: docker compose -f docker-compose.yml build
