services:
  mysql:
    image: mysql:8.0
    container_name: sprintflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: sprintflow_db
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sprintflow-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sprintflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_MAIN_ALLOW_CIRCULAR_REFERENCES: "true"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://107.23.191.97"
    ports:
      - "8080:8080"
    # No healthcheck (curl not available)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sprintflow-frontend
    restart: unless-stopped
    depends_on:
      - backend   # simple dependency, no condition
    ports:
      - "80:80"

volumes:
  mysql_data:
